# wrangler.toml — Cloudflare Pages Projekt "schlosscafe" (cafemitherz.at)
#
# ACHTUNG: Sobald diese Datei deployt wird, ist sie die Quelle der Wahrheit für
# Bindings/Vars — Dashboard-Bindings werden überschrieben. Daher hier nur die
# wirklich genutzten Bindings führen. (Der frühere Besucherzähler /api/track +
# /api/stats samt COUNTER-Binding wurde am 15.06.2026 abgelöst — Reichweiten-
# messung läuft zentral über _middleware.js + media.vis-a-vision.com/beacon.)
# Secrets gehören nie in diese Datei.
name = "schlosscafe"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"

# vavadmin-Content: GLEICHER Namespace wie Silke/vav-admin —
# Mandantentrennung über Key-Präfix content-<CUSTOMER_ID>.
[[kv_namespaces]]
binding = "CONTENT_KV"
id = "6e541cb414d64bdd8201e4e022844d66"
preview_id = "ba03ed1850fb4fa48e86c294b39e55b7"

[vars]
CUSTOMER_ID = "cafemitherz"
